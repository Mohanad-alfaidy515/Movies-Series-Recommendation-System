<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - CINEMAX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style-checkout.css">
</head>
<body>

    <div class="checkout-box" id="form-container">
        <span class="step-label">STEP 3 OF 3</span>
        <h1>Set up your credit or debit card</h1>
        <div class="card-icons">
            <i class="bi bi-credit-card-2-front"></i>
            <i class="bi bi-wallet2"></i>
        </div>
        <div class="secure-note"><i class="bi bi-lock"></i> End-to-end encrypted</div>
        
        <form id="paymentForm">
            <input type="text" id="cardNumber" placeholder="Card Number" required maxlength="16">
            <input type="text" id="expDate" placeholder="Expiration Date (MM/YY)" required maxlength="5">
            <input type="text" id="cvv" placeholder="CVV" required maxlength="3">
            <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>
            <button type="submit" class="btn-finish">Start Membership</button>
        </form>
    </div>

    <div id="success-modal">
        <div class="success-circle">✓</div>
        <h1 class="success-title">Welcome to CINEMAX!</h1>
        <p>Your subscription is now active.</p>
        <button class="btn-finish success-btn" id="backToHome">Start Watching</button>
    </div>

    <script src="checkout-script.js"></script>
</body>
</html>
